jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Deploy site
        run: echo "🚀 Deploying to ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}..."

  verify-meta-tag:
    runs-on: ubuntu-latest
    needs: deploy
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Check homepage for Base meta tag
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
        run: |
          RESPONSE=$(curl -s "$APP_DOMAIN")
          if echo "$RESPONSE" | grep -qi 'meta name="base:app_id"'; then
            echo "✅ Meta tag detected!"
          else
            echo "❌ Meta tag not found."
            exit 1
          fi
